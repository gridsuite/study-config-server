spring:
  application:
    name: study-config
  cloud:
    stream:
      bindings:
        publishElementUpdate-out-0:
          destination:  ${powsybl-ws.rabbitmq.destination.prefix:}element.update
      output-bindings: publishElementUpdate-out-0
  main:
    allow-circular-references: true

powsybl-ws:
  database:
    name: studyconfig

study-config:
  nad-positions-generation-default-mode: GEOGRAPHICAL_COORDINATES
  base-map: mapbox
